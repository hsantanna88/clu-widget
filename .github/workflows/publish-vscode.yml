name: VS Code Extension — Release & Publish

on:
  push:
    branches: [main]
    paths: [vscode-extension/package.json]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./vscode-extension/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=vscode-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: '20'

      - name: Install and package
        if: steps.check.outputs.exists == 'false'
        working-directory: vscode-extension
        run: |
          npm ci
          npx @vscode/vsce package

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            vscode-extension/clu-${{ steps.version.outputs.version }}.vsix \
            --title "clu VS Code Extension v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: steps.check.outputs.exists == 'false'
        working-directory: vscode-extension
        run: npx @vscode/vsce publish --pat "${{ secrets.VSCE_PAT }}"
